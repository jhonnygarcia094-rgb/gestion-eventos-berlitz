<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña — Berlitz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #001a5e 0%, #0050f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #0050f0, #001a5e);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(0, 80, 240, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #1a2332;
            margin-bottom: 8px;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 14px 11px 42px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #1a2332;
            outline: none;
            transition: all .2s;
        }

        input[type="password"]:focus {
            border-color: #0050f0;
            box-shadow: 0 0 0 4px rgba(0, 80, 240, .08);
        }

        .btn {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: linear-gradient(135deg, #0050f0, #001a5e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 14px rgba(0, 80, 240, .35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 80, 240, .45);
        }

        .btn:disabled {
            opacity: .65;
            cursor: not-allowed;
        }

        .alert {
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            align-items: center;
            gap: 10px;
        }

        .alert.show {
            display: flex;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #0050f0;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fa-spin {
            animation: spin .8s linear infinite;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-wrap"><i class="fa-solid fa-key"></i></div>
        <h1>Nueva Contraseña</h1>
        <p>Crea una contraseña segura de al menos 8 caracteres para acceder al sistema.</p>

        <div id="alertBox" class="alert"></div>

        <div id="formSection">
            <div class="form-group">
                <label>Nueva contraseña</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="newPass" placeholder="Mínimo 8 caracteres">
                </div>
            </div>
            <div class="form-group">
                <label>Confirmar contraseña</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="confirmPass" placeholder="Repite la contraseña">
                </div>
            </div>
            <button class="btn" id="btnReset">
                <span>Restablecer Contraseña</span>
                <i class="fa-solid fa-shield-halved"></i>
            </button>
        </div>

        <a href="/login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión</a>
    </div>

    <script>
        const API = '';
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('formSection').innerHTML = '<div style="text-align:center;color:#991b1b;padding:20px;"><i class="fa-solid fa-circle-exclamation" style="font-size:32px;margin-bottom:12px;display:block;"></i>Enlace inválido o expirado.<br>Solicita uno nuevo desde el login.</div>';
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alertBox');
            el.className = `alert show alert-${type}`;
            el.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
        }

        document.getElementById('btnReset')?.addEventListener('click', async () => {
            const newPass = document.getElementById('newPass')?.value;
            const confirm = document.getElementById('confirmPass')?.value;

            if (!newPass || !confirm) { showAlert('Completa ambos campos', 'error'); return; }
            if (newPass !== confirm) { showAlert('Las contraseñas no coinciden', 'error'); return; }
            if (newPass.length < 8) { showAlert('Mínimo 8 caracteres', 'error'); return; }

            const btn = document.getElementById('btnReset');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';

            try {
                const resp = await fetch(`${API}/api/auth/reset-contraseña`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, contraseñaNueva: newPass })
                });
                const data = await resp.json();
                if (resp.ok) {
                    showAlert(data.mensaje, 'success');
                    document.getElementById('formSection').style.opacity = '0.4';
                    setTimeout(() => window.location.href = '/login.html', 2500);
                } else {
                    showAlert(data.error || 'Error al restablecer', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Restablecer Contraseña</span><i class="fa-solid fa-shield-halved"></i>';
                }
            } catch (err) {
                showAlert('Error de conexión', 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>Restablecer Contraseña</span><i class="fa-solid fa-shield-halved"></i>';
            }
        });
    </script>
</body>

</html>
